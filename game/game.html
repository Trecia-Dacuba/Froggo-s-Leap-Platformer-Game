<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Froggo's Leap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrapper">
    <canvas id="gc" width="800" height="500"></canvas>

    <div id="hud">
      <div class="hb"><span class="hl">SCORE</span><span id="sHud">0</span></div>
      <div class="hb"><span class="hl">FLIES</span><span id="fHud">0/0</span></div>
      <div class="hb"><span class="hl">LEVEL</span><span id="lvHud">1</span></div>
      <div class="hb"><span class="hl">LIVES</span><span id="livHud">❤️❤️❤️</span></div>
      <div class="hb"><span class="hl">BEST</span><span id="hiHud">0</span></div>
    </div>

    <div id="powerHud">⚡ <span id="pHud"></span></div>

    <div id="overlay"></div>

    <div id="dpad">
      <div class="ds">
        <div class="dp-btn" id="dp-left">◀</div>
        <div class="dp-btn" id="dp-right">▶</div>
      </div>
      <div class="ds">
        <div class="dp-btn" id="dpad-jump">▲</div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
